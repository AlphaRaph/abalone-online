services:
  db:
    image: postgres:16
    container_name: abalone_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: abalone_db
    ports:
      - "5432:5432"
    volumes:
      - abalone_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: abalone_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: abalone_web
    command: >
      bash -c "python manage.py makemigrations game &&
               python manage.py migrate &&
               python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

volumes:
  abalone_pg_data: